name: Build Skill Zip Release

on:
  release:
    types: [published]

env:
  SKILL_DIR: "skills/ccpm-scheduler"
  SKILL_NAME: "ccpm-scheduler"

jobs:
  build-zip:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Prepare Skill Folder
        # The internal folder MUST remain unversioned for Claude to recognize it
        run: |
          mkdir -p build/${{ env.SKILL_NAME }}
          rsync -av ${{ env.SKILL_DIR }}/ build/${{ env.SKILL_NAME }} \
            --exclude '.claude'

      - name: Create Versioned Zip Archive
        working-directory: build
        # Appends the GitHub release tag to the zip filename (e.g., ccpm-scheduler-v1.0.0.zip)
        run: zip -r ../${{ env.SKILL_NAME }}-${{ github.event.release.tag_name }}.zip ${{ env.SKILL_NAME }}

      - name: Upload artifact to Release
        uses: softprops/action-gh-release@v3
        with:
          # Uploads the newly versioned zip file
          files: ${{ env.SKILL_NAME }}-${{ github.event.release.tag_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
